<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand">
        <strong>Painel</strong>
      </div>
      <nav>
        <button type="button" class="sidebar-link" data-section="dashboard">Dashboard</button>
        <button type="button" class="sidebar-link" data-section="patients">Pacientes Cadastrados</button>
        <button type="button" class="sidebar-link" data-section="appointments">Agendamentos</button>
        <button type="button" class="sidebar-link" data-section="site">Editar Site</button>
        <button type="button" class="sidebar-link" data-section="settings">Configurações</button>
      </nav>
      <div class="sidebar-footer">
        <button id="admin-logout" class="sidebar-link">Sair</button>
      </div>
    </aside>
    <main class="admin-main">
      <header class="admin-header">
        <div>
          <h1>Admin</h1>
        </div>
        <div class="admin-meta">
          <span id="current-user-role"></span>
        </div>
      </header>
      <div id="admin-content" class="admin-content"></div>
    </main>
  </div>

  <script src="js/site-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
