<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo | Alexa Medeiros Odontologia</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="login">
  <main class="page-main">
    <section class="section">
      <div class="container">
        <div class="form-card" style="max-width: 38rem; margin: 0 auto;">
          <p class="eyebrow">Área de Administração</p>
          <h1 style="margin-bottom: 1rem;">Login de administrador</h1>
          <form id="login-form" class="site-form" novalidate>
            <label>
              E-mail
              <input type="email" name="email" placeholder="Digite seu e-mail" required>
            </label>
            <label>
              Senha
              <input type="password" name="senha" placeholder="Digite sua senha" required>
            </label>
            <button class="button" type="submit">Entrar</button>
            <p id="retorno-login" class="form-feedback" aria-live="polite"></p>
          </form>
          <p style="margin-top: 1.5rem;"><a class="text-link" href="index.html">Voltar para o site</a></p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/site-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
